# Supply-chain local: 2 días (la global son 7) para permitir el parche reciente de esbuild 0.28.1.
# 2880 minutos = 2 días.
minimumReleaseAge: 2880
allowBuilds:
  '@tailwindcss/oxide': false
  esbuild: false
  sharp: false
overrides:
  esbuild: '>=0.28.1'
  devalue: '>=5.8.1'
  path-to-regexp: '>=6.3.0'
  brace-expansion: '>=5.0.6'
